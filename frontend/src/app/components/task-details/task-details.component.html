<div class="container">
  <div class="row mb-4">
    <div class="col">
      <h2>Task Details</h2>
    </div>
    <div class="col-auto">
      <a routerLink="/tasks" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back to Tasks
      </a>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div *ngIf="loading" class="d-flex justify-content-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="!loading && !task" class="alert alert-warning">
    Task not found. <a routerLink="/tasks">Return to task list</a>.
  </div>

  <div *ngIf="!loading && task" class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="mb-0">Task #{{ task.id }}</h5>
      <span class="badge" [ngClass]="task.completed ? 'bg-success' : 'bg-warning'">
        {{ task.completed ? 'Completed' : 'Pending' }}
      </span>
    </div>
    <div class="card-body">
      <h3 class="card-title">{{ task.title }}</h3>
      <p class="card-text">{{ task.description }}</p>
    </div>
    <div class="card-footer">
      <div class="d-flex justify-content-between">
        <div>
          <button class="btn btn-success me-2" (click)="toggleTaskStatus()">
            <i class="bi" [ngClass]="task.completed ? 'bi-x-circle' : 'bi-check-circle'"></i>
            {{ task.completed ? 'Mark as Pending' : 'Mark as Completed' }}
          </button>
        </div>
        <div>
          <a [routerLink]="['/edit', task.id]" class="btn btn-warning me-2">
            <i class="bi bi-pencil"></i> Edit
          </a>
          <button class="btn btn-danger" (click)="deleteTask()">
            <i class="bi bi-trash"></i> Delete
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
