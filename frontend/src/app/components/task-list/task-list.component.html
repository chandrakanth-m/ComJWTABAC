<div class="container">
  <div class="row mb-4">
    <div class="col">
      <h2>Task List</h2>
      <p>Manage your tasks</p>
    </div>
    <div class="col-auto">
      <a routerLink="/add" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Add New Task
      </a>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div *ngIf="loading" class="d-flex justify-content-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="!loading && tasks.length === 0" class="alert alert-info">
    No tasks found. Click "Add New Task" to create one.
  </div>

  <div *ngIf="!loading && tasks.length > 0" class="row">
    <div class="col-md-12">
      <div class="card mb-4" *ngFor="let task of tasks">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h5 class="card-title" [ngClass]="{'text-decoration-line-through': task.completed}">
                {{ task.title }}
              </h5>
              <p class="card-text">{{ task.description }}</p>
            </div>
            <div>
              <div class="form-check form-switch d-inline-block me-2">
                <input class="form-check-input" type="checkbox" [checked]="task.completed"
                  (change)="toggleTaskStatus(task)" id="task-{{task.id}}">
                <label class="form-check-label" for="task-{{task.id}}">
                  {{ task.completed ? 'Completed' : 'Pending' }}
                </label>
              </div>
              <a [routerLink]="['/tasks', task.id]" class="btn btn-sm btn-info me-1">
                <i class="bi bi-eye"></i> View
              </a>
              <a [routerLink]="['/edit', task.id]" class="btn btn-sm btn-warning me-1">
                <i class="bi bi-pencil"></i> Edit
              </a>
              <button class="btn btn-sm btn-danger" (click)="deleteTask(task.id!)">
                <i class="bi bi-trash"></i> Delete
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
